schemes:
  - http
  - https
basePath: /
definitions:
  handlers.CreateMessageRequest:
    properties:
      channel:
        type: string
      data:
        additionalProperties: {}
        type: object
      metadata:
        additionalProperties: {}
        type: object
      template:
        type: string
      tenant:
        type: string
      to:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - channel
    - data
    - template
    - tenant
    - to
    type: object
  handlers.enqueueResponse:
    properties:
      requestId:
        example: req_123
        type: string
      status:
        example: queued
        type: string
    type: object
  handlers.errorResponse:
    properties:
      error:
        example: validation failed
        type: string
    type: object
  handlers.livenessResponse:
    properties:
      service:
        example: notifications-app
        type: string
      status:
        example: ok
        type: string
    type: object
  handlers.readinessResponse:
    properties:
      dependencies:
        additionalProperties:
          type: string
        type: object
      status:
        example: OK
        type: string
    type: object
  handlers.templateListResponse:
    properties:
      templates:
        items:
          $ref: '#/definitions/handlers.templateSummary'
        type: array
    type: object
  handlers.templateSummary:
    properties:
      channel:
        example: email
        type: string
      id:
        example: payment_success
        type: string
    type: object
info:
  contact: {}
  description: |
    HTTP API for the BengoBox notifications service.
    
    **Authentication**: All protected endpoints require a Bearer token from auth-service.
    Include the token in the Authorization header: `Authorization: Bearer {token}`
  title: Notifications Service API
  version: 0.1.0
paths:
  /healthz:
    get:
      description: Returns OK when the API process is running.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.livenessResponse'
      summary: Service liveness probe
      tags:
      - Health
  /metrics:
    get:
      description: Exposes Prometheus metrics for scraping.
      produces:
      - text/plain
      responses:
        "200":
          description: Prometheus metrics payload
          schema:
            type: string
      summary: Prometheus metrics
      tags:
      - Health
  /readyz:
    get:
      description: Validates connectivity to Postgres, Redis, and NATS (when configured).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.readinessResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.readinessResponse'
      summary: Readiness probe
      tags:
      - Health
  /v1/{tenantId}/notifications/messages:
    post:
      consumes:
      - application/json
      description: Accepts a notification payload and queues it for downstream processing.
      parameters:
      - description: Tenant identifier
        in: path
        name: tenantId
        required: true
        type: string
      - description: Message payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateMessageRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/handlers.enqueueResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - bearerAuth: []
      summary: Queue notification message
      tags:
      - Notifications
  /v1/{tenantId}/templates:
    get:
      description: Returns the default set of notification templates available to
        the tenant.
      parameters:
      - description: Tenant identifier
        in: path
        name: tenantId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.templateListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - bearerAuth: []
      summary: List notification templates
      tags:
      - Templates
schemes:
- http
securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "JWT token from auth-service. Format: Bearer {token}"
swagger: "2.0"
