{{ define "content" }}
  <p>Hello {{ .name }},</p>
  <p>Your order is ready for pickup!</p>
  <p><strong>Order ID:</strong> {{ .order_id }}</p>
  <p><strong>Outlet:</strong> {{ .outlet_name }}</p>
  {{ if .pickup_location }}
  <p><strong>Pickup Location:</strong> {{ .pickup_location }}</p>
  {{ end }}
  <p>
    <a class="button" href="{{ .order_link }}">View Order</a>
  </p>
  <p class="muted">Thank you for your order!</p>
{{ end }}
