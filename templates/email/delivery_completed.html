{{ define "content" }}
  <p>Hello {{ .name }},</p>
  <p>Your delivery has been completed!</p>
  <p><strong>Order ID:</strong> {{ .order_id }}</p>
  <p><strong>Delivered At:</strong> {{ .delivered_at }}</p>
  {{ if .proof_of_delivery }}
  <p><strong>Proof of Delivery:</strong> {{ .proof_of_delivery }}</p>
  {{ end }}
  <p>
    <a class="button" href="{{ .order_link }}">View Order</a>
  </p>
  <p class="muted">Thank you for your order!</p>
{{ end }}
