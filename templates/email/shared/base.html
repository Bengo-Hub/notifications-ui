<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
      :root {
        --primary: {{ or .brand_primary_color "#0F766E" }};
        --secondary: {{ or .brand_secondary_color "#134E4A" }};
      }
      body { font-family: Arial, sans-serif; background:#f6f9fc; color:#111827; margin:0; padding:0; }
      .container { max-width:600px; margin:0 auto; background:#ffffff; }
      .header { background: var(--primary); color:#ffffff; padding:16px 24px; display:flex; align-items:center; }
      .brand-logo { height:32px; width:auto; margin-right:12px; }
      .brand-name { font-size:18px; font-weight:700; }
      .content { padding:24px; }
      .footer { background:#f3f4f6; color:#4b5563; padding:16px 24px; font-size:12px; }
      .muted { color:#6b7280; }
      a.button { background: var(--primary); color:#ffffff !important; text-decoration:none; padding:10px 16px; border-radius:6px; display:inline-block; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        {{ if .brand_logo_url }}<img class="brand-logo" src="{{ .brand_logo_url }}" alt="{{ .brand_name }}"/>{{ end }}
        <div class="brand-name">{{ or .brand_name "BengoBox" }}</div>
      </div>
      <div class="content">
        {{ template "content" . }}
      </div>
      <div class="footer">
        <div>{{ or .brand_name "BengoBox" }}</div>
        <div class="muted">
          {{ if .brand_email }}Email: {{ .brand_email }}{{ end }} {{ if and .brand_email .brand_phone }} | {{ end }} {{ if .brand_phone }}Phone: {{ .brand_phone }}{{ end }}
        </div>
      </div>
    </div>
  </body>
  </html>
