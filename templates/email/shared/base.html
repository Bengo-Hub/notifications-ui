<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
  </head>
  <body style="font-family:Arial,sans-serif;background:#f6f9fc;color:#111827;margin:0;padding:0;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f9fc;">
      <tr>
        <td align="center" style="padding:24px 0;">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:8px;overflow:hidden;">
            <!-- Header -->
            <tr>
              <td style="background:{{ or .brand_primary_color "#0F766E" }};color:#ffffff;padding:16px 24px;">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    {{ if .brand_logo_url }}<td style="padding-right:12px;"><img src="{{ .brand_logo_url }}" alt="{{ or .brand_name "Notifications" }}" style="height:32px;width:auto;" /></td>{{ end }}
                    <td style="font-size:18px;font-weight:700;color:#ffffff;">{{ or .brand_name "Notifications" }}</td>
                  </tr>
                </table>
              </td>
            </tr>
            <!-- Content -->
            <tr>
              <td style="padding:24px;">
                {{ template "content" . }}
              </td>
            </tr>
            <!-- Footer -->
            <tr>
              <td style="background:#f3f4f6;color:#4b5563;padding:16px 24px;font-size:12px;">
                <div>{{ or .brand_name "Notifications" }}</div>
                <div style="color:#6b7280;">
                  {{ if .brand_email }}Email: {{ .brand_email }}{{ end }}{{ if and .brand_email .brand_phone }} | {{ end }}{{ if .brand_phone }}Phone: {{ .brand_phone }}{{ end }}
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
