apiVersion: v1
kind: Secret
metadata:
  name: notifications-api-env
  namespace: notifications
type: Opaque
stringData:
  # Database connection - uses shared PostgreSQL in infra namespace
  # Set via GitHub Secrets during deployment
  NOTIFICATIONS_POSTGRES_URL: "${NOTIFICATIONS_POSTGRES_URL}"

  # Redis connection - uses shared Redis in infra namespace
  NOTIFICATIONS_REDIS_ADDR: "redis-master.infra.svc.cluster.local:6379"

  # NATS connection - uses shared NATS in messaging namespace
  NOTIFICATIONS_NATS_URL: "nats://nats.messaging.svc.cluster.local:4222"

  # Default sender configuration - Set via GitHub Secrets
  NOTIFICATIONS_DEFAULT_EMAIL_SENDER: "${NOTIFICATIONS_DEFAULT_EMAIL_SENDER}"
